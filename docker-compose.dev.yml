services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    environment:
      PORT: 3001
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    depends_on:
      - server
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

volumes:
  server_node_modules:
  web_node_modules:
